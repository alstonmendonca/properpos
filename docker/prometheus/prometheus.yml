# ProperPOS Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'properpos-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load rules once and periodically evaluate them
rule_files:
  - /etc/prometheus/rules/*.yml

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # API Gateway metrics
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:3000']
    metrics_path: /metrics
    scrape_interval: 10s

  # Auth Service metrics
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth:3001']
    metrics_path: /metrics

  # Tenant Service metrics
  - job_name: 'tenant-service'
    static_configs:
      - targets: ['tenant:3002']
    metrics_path: /metrics

  # POS Service metrics
  - job_name: 'pos-service'
    static_configs:
      - targets: ['pos:3003']
    metrics_path: /metrics

  # Inventory Service metrics
  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory:3004']
    metrics_path: /metrics

  # Analytics Service metrics
  - job_name: 'analytics-service'
    static_configs:
      - targets: ['analytics:3005']
    metrics_path: /metrics

  # Billing Service metrics
  - job_name: 'billing-service'
    static_configs:
      - targets: ['billing:3006']
    metrics_path: /metrics

  # Notification Service metrics
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification:3008']
    metrics_path: /metrics

  # Audit Service metrics
  - job_name: 'audit-service'
    static_configs:
      - targets: ['audit:3009']
    metrics_path: /metrics

  # MongoDB exporter
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb-exporter:9216']

  # Redis exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Node exporter for host metrics
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # cAdvisor for container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
